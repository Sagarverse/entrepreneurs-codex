name: valion
description: "Valion — A cinematic 30-day journey of the mind, the hand, and the pen."
publish_to: 'none'
version: 1.1.0+2

environment:
  sdk: ^3.10.8

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  shared_preferences: ^2.2.0
  fl_chart: ^0.68.0
  google_fonts: ^6.1.0
  provider: ^6.1.2
  url_launcher: ^6.2.5
  share_plus: ^9.0.0
  audioplayers: ^6.0.0
  pdf: ^3.12.0
  printing: ^5.13.1
  http: ^1.2.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.14.3

flutter_launcher_icons:
  android: true
  ios: false
  image_path: "assets/icon.png"
  adaptive_icon_background: "#0A0A0A"
  adaptive_icon_foreground: "assets/icon.png"

flutter:
  uses-material-design: true
  assets:
    - assets/sounds/
    - assets/developer.png
    - assets/icon.png